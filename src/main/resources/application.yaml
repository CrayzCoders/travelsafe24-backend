spring:
  application:
    name: staysafe
  datasource:
    url: jdbc:postgresql://postgres:5432/staysafe
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false