name: Deploy CI
on:
  workflow_dispatch:
    inputs:
      run_import:
        description: 'Run import-geometry and import-amenities before starting'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:17-3.6-alpine
        env:
          POSTGRES_DB: staysafe
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build (runs tests)
        run: mvn -B package
      - name: Stage deploy bundle
        run: |
          mkdir -p deploy/target
          cp target/*.jar deploy/target/
          cp Dockerfile deploy/
          cp docker-compose.yml deploy/
      - name: Upload deploy bundle
        uses: actions/upload-artifact@v4
        with:
          name: deploy
          path: deploy/
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download deploy bundle
        uses: actions/download-artifact@v4
        with:
          name: deploy
          path: deploy/
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.SSH_PORT || 22 }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
      - name: Rsync bundle to server
        run: |
          rsync -avz --delete --exclude='.env' \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.SSH_PORT || 22 }}" \
            ./deploy/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.BACKEND_DEPLOY_PATH }}/
      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.SSH_PORT || 22 }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s <<'EOF'
            set -euo pipefail
            cd ${{ secrets.BACKEND_DEPLOY_PATH }}
            docker compose build app
          EOF
      - name: Run import profiles (optional, first-time setup)
        if: ${{ inputs.run_import }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.SSH_PORT || 22 }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s <<'EOF'
            set -euo pipefail
            cd ${{ secrets.BACKEND_DEPLOY_PATH }}
            docker compose up -d postgres
            # Wait for postgres healthcheck
            until [ "$(docker inspect -f '{{.State.Health.Status}}' $(docker compose ps -q postgres))" = "healthy" ]; do
              echo "Waiting for postgres..."
              sleep 2
            done
            docker compose run --rm -e SPRING_PROFILES_ACTIVE=import-geometry app
            docker compose run --rm -e SPRING_PROFILES_ACTIVE=import-amenities app
          EOF
      - name: Start app
        run: |
          ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.SSH_PORT || 22 }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s <<'EOF'
            set -euo pipefail
            cd ${{ secrets.BACKEND_DEPLOY_PATH }}
            docker compose up -d
            docker compose ps
          EOF
